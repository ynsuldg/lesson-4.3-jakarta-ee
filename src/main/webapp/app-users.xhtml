<!DOCTYPE html>
<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets">

<f:view>
    <h:head>
        <title>App Users</title>
    </h:head>

    <h:body>
        <h:form>
            <h:panelGrid columns="2">
                <h:outputLabel for="username" value="Username:"/>
                <h:inputText id="username" value="#{appUserBean.username}" required="true"/>

                <h:outputLabel for="password" value="Password:"/>
                <h:inputSecret id="password" value="#{appUserBean.password}" required="true"/>
            </h:panelGrid>

            <br/>

            <h:commandButton value="Spara" action="#{appUserBean.saveAppUser}"/>
        </h:form>

        <h2>Alla appusers</h2>

        <ui:repeat value="#{appUserBean.allAppUsers}" var="user">
            <p>ID: #{user.id} | Username: #{user.username}</p>
        </ui:repeat>

        <br/>
        <h:link value="Tillbaka till login" outcome="login.xhtml"/>

    </h:body>
</f:view>
</html>
